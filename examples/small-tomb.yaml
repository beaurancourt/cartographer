version: 1
grid:
  cell_size: 50
  ft_per_cell: 5
background:
  style: ink

# Layout (cells):
#   entry   [0..6]   × [0..6]    6×6
#   gap@x=6
#   hall    [7..14]  × [1..4]    7×3 hallway
#   gap@x=14
#   chamber [15..23] × [0..8]    8×8 main hall
#   gap@y=8 (secret door here)
#   vault   [16..22] × [9..14]   6×5 tomb

layers:
  - id: main
    carves:
      - { id: entry,   rect: [0,  0,  6, 6] }
      - { id: hall,    rect: [7,  1,  7, 3] }
      - { id: chamber, rect: [15, 0,  8, 8] }
      - { id: vault,   rect: [16, 9,  6, 5] }
    objects:
      - { id: d1, type: door,        at: [6,  2], facing: ew }   # entry → hall
      - { id: d2, type: door,        at: [14, 2], facing: ew }   # hall → chamber
      - { id: d3, type: secret-door, at: [18, 8], facing: ns }   # chamber → vault
      - { id: t1, type: pit-trap,    at: [10, 2] }
      - { id: a1, type: altar,       at: [19, 1] }
      - { id: f1, type: fountain,    at: [16, 5] }
      - { id: s1, type: stairs-down, at: [2,  4], facing: s }
      - { id: c2, type: column,      at: [17, 3] }
      - { id: c3, type: column,      at: [21, 3] }
      - { id: c4, type: column,      at: [17, 5] }
      - { id: c5, type: column,      at: [21, 5] }
      - { id: r1, type: rubble,      at: [22, 6] }
    notes:
      - { id: n1, at: [10, 3], text: "10ft pit" }
      - { id: n2, at: [19, 12], text: "tomb" }
