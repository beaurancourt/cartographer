version: 1
grid:
  cell_size: 50
  ft_per_cell: 5
background:
  style: ink

# Layout (cells):
#   entry [0..5]   gap@5   hall [6..12]   gap@12   chamber [13..20]
#                                                    |
#                                                  carve `c1` (2 cells)
#                                                    |
#                                                  vault   [13..18]
#
# Each `gap` is a single-cell strip between two rooms. A door placed in
# the gap cell punches a slot in the wall and the door symbol renders
# across the slot.

layers:
  - id: main
    carves:
      - { id: entry,   rect: [0,  0,  5, 4] }
      - { id: hall,    rect: [6,  1,  6, 2] }
      - { id: chamber, rect: [13, 0,  7, 6] }
      - { id: vault,   rect: [13, 8,  5, 4] }
      - { id: c1,      path: [[15, 6], [15, 8]], width: 1 }
    objects:
      - { id: d1, type: door,        at: [5,  1], facing: ew }   # entry → hall
      - { id: d2, type: door,        at: [12, 1], facing: ew }   # hall → chamber
      - { id: d3, type: secret-door, at: [15, 7], facing: ns }
      - { id: t1, type: pit-trap,    at: [9,  1] }
      - { id: a1, type: altar,       at: [16, 2] }
      - { id: s1, type: stairs-down, at: [1,  3], facing: s }
      - { id: c2, type: column,      at: [15, 2] }
      - { id: c3, type: column,      at: [17, 4] }
notes:
  - { at: [9, 2], text: "10ft pit" }
