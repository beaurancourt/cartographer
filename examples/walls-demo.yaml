version: 1
grid:
  cell_size: 50
  ft_per_cell: 5

# Iterating toward the reference. Changes from last pass:
#   - Hall reduced from 3 cells (hall_a + gap + hall_b) to 1 cell — just
#     the door's gap cell between r1's east wall and r2's west wall.
#   - r2 shape flipped: top now narrower-on-left, bottom full width,
#     so the missing corner of r2's bounding box is at the top-right (NE).
#   - r3 moved up to y=7 so it actually shares a horizontal edge with
#     r2_bot (y=7, x∈[9, 11]) for the wall + secret door to bridge.

layers:
  - id: main
    carves:
      - { id: r1,     rect: [1, 1, 5, 5] }
      - { id: r2_top, rect: [7, 2, 2, 2] }     # 2×2 top-left of r2
      - { id: r2_bot, rect: [7, 4, 4, 3] }     # 4×3 bottom of r2 (extends right)
      - { id: r3,     rect: [9, 7, 5, 5] }     # touches r2_bot at y=7
    walls:
      - { id: w1, segment: [[9, 7], [11, 7]] }   # r2 ↔ r3 shared edge
    objects:
      - { id: d1, type: door,        at: [6,   3],   facing: ew }   # 1-cell gap between r1 and r2_top
      - { id: d2, type: secret-door, at: [9.5, 6.5], facing: ew }   # on w1
      - { id: s1, type: stairs-up,   at: [1.5, 3],   facing: w }
