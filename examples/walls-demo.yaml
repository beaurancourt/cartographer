version: 1
grid:
  cell_size: 50
  ft_per_cell: 5
background:
  style: ink

# Reproducing the Arden-Vul reference geometry exactly:
#   r1: 4×4 top-left
#   r2: 4×3 to the east, touching r1's east wall but offset 1 cell south
#       → r1 has an exposed east wall at y∈[1,2] above r2, and a shared
#         wall at x=5, y∈[2,5] (drawn explicitly so it's visible)
#   r3: 4×6 below, touching r2's south wall, offset 1 cell east
#       → shared wall at y=5, x∈[6,9]
#   Doors sit ON the walls (half-cell positioning so the door center
#   lands exactly on the wall line):
#     d1 vertical pill on the vertical wall (facing: ns → 90° rotation)
#     d2 horizontal "S" marker on the horizontal wall (no rotation)

layers:
  - id: main
    carves:
      - { id: r1, rect: [1, 1, 4, 4] }
      - { id: r2, rect: [5, 2, 4, 3] }
      - { id: r3, rect: [6, 5, 4, 6] }
    walls:
      - { id: w1, segment: [[5, 2], [5, 5]] }   # vertical, r1 ↔ r2
      - { id: w2, segment: [[6, 5], [9, 5]] }   # horizontal, r2 ↔ r3
    objects:
      - { id: d1, type: door,        at: [4.5, 2.5], facing: ns }   # on w1
      - { id: d2, type: secret-door, at: [7,   4.5], facing: ew }   # on w2
      - { id: s1, type: stairs-up,   at: [1,   2],   facing: w }
