      - { id: r3,  rect: [18, 36, 5, 5] }   # storeroom
      - { id: r4,  rect: [30, 38, 5, 5] }   # warded vault (trapped)
      - { id: r5,  rect: [31, 22, 5, 6] }   # beast pen
      # Wing 2 — laboratory
      - { id: r10, rect: [50, 26, 9, 9] }   # grand lab / ritual crossroads (hub)
      - { id: r8,  rect: [54, 10, 6, 6] }   # alchemy vault (trapped, hub)
      - { id: r7,  rect: [42, 8, 5, 5] }    # initiate cells
      - { id: r9,  rect: [52, 18, 5, 5] }   # warp horror
      - { id: r11, rect: [64, 28, 6, 6] }   # scrying font
