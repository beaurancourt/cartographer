version: 1
grid: { cell_size: 50, ft_per_cell: 5 }

# Wizard tower, now a chaos cult lair. 24 rooms / 4 wings.
# Wing 1 (entry, left): old public floor — gate shrine, muster hall.
# Wing 2 (center): laboratory — grand ritual crossroads (r10, 5-way hub).
# Wing 3 (upper right): library + observatory — defaced archive, star shrine.
# Wing 4 (lower): wizard's deep sanctum — chaos high priest's throne.

layers:
